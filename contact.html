<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <meta name="description" content="Kontaktinformationen und FAQ für das Storeground Festival.">
    <meta name="author" content="Lean Melone">
    <link rel="stylesheet" href="CSS/contact.css">
    <link rel="icon" href="IMG/tabbild.jpg" type="image/jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <a href="index.html">
                <picture class="logo">
                    <source srcset="IMG/Storeground_Logo.webp" type="image/webp">
                    <img src="IMG/Storeground_Logo.png" alt="Storeground Logo">
                </picture>
            </a>
            <nav class="nav">
                <ul>
                    <li><a href="infotickets.html">Info & Tickets</a></li>
                    <li><a href="about.html">Über das Festival</a></li>
                    <!-- <li><a href="gallery.html">Galerie</a></li> -->
                    <li><a href="contact.html" class="active">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1>Contact</h1>

        <form action="https://api.web3forms.com/submit" method="post" class="contact-form" id="meinFormular">
            <input type="hidden" name="access_key" value="1edda660-a948-4657-b14c-86b412332858">

            <fieldset>
                <legend>Persönliche Daten</legend>

                <div>
                    <label for="name">Name:*</label><br>
                    <input type="text" id="name" name="name" minlength="2" maxlength="20" required>
                </div>
                <div>
                    <label for="email">E-Mail:*</label><br>
                    <input type="email" id="email" name="email" required placeholder="email@email.ch">
                </div>
                <div>
                    <label for="alter">Alter:*</label><br>
                    <input type="number" id="alter" name="alter" min="0" max="140" required>
                </div>
                <div>
                    <label>Geschlecht:</label><br>
                    <input type="radio" id="maennlich" name="geschlecht" value="männlich">
                    <label for="maennlich">Männlich</label>
                    <input type="radio" id="weiblich" name="geschlecht" value="weiblich">
                    <label for="weiblich">Weiblich</label>
                    <input type="radio" id="divers" name="geschlecht" value="divers">
                    <label for="divers">Divers</label>
                </div>
                <div>
                    <label for="tel">Telefonnummer:</label><br>
                    <input type="tel" id="tel" name="tel" pattern="[0-9]{3}[ ][0-9]{3}[ ][0-9]{2}[ ][0-9]{2}"
                        placeholder="123 456 78 90">
                </div>

            </fieldset>

            <div>
                <label for="ticket">Ticketkategorie:*</label><br>
                <select id="ticket" name="ticket" required>
                    <option value="">Bitte wählen</option>
                    <option value="ticket">Ticket</option>
                    <option value="vip">VIP-Ticket</option>
                    <option value="backstage">Backstage-Pass</option>
                </select>
            </div>
            <div>
                <label for="message">Nachricht:*</label><br>
                <textarea id="message" name="message" required></textarea>
            </div>
            <div>
                <label for="date">Datum:*</label><br>
                <input type="date" id="date" name="date" required>
            </div>
            <div>
                <label for="time">Uhrzeit:*</label><br>
                <input type="time" id="time" name="time" required>
            </div>
            <div>
                <input type="checkbox" id="datenschutz" name="datenschutz" required>
                <label for="datenschutz">Ich akzeptiere die Datenschutzerklärung.*</label>
            </div>

            <button type="submit">Absenden</button>
        </form>

        <script>
            const formular = document.getElementById("meinFormular");

            formular.addEventListener("submit", function (event) {
                // Formular wird normal abgeschickt

                setTimeout(() => {
                    formular.reset();
                }, 0);
            });
        </script>
    </main>


    <footer class="site-footer">
        <div class="container">
            <p class="brand">Storeground</p>
            <a href="impressum.html" class="impressum">Impressum</a>
            <p>&copy; 2026 Storeground. Alle Rechte vorbehalten.</p>
        </div>
    </footer>
</body>

</html>
