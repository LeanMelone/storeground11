<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <meta name="description" content="Kontaktinformationen und FAQ für das Storeground Festival.">
    <meta name="author" content="Lean Melone">
    <link rel="stylesheet" href="CSS/contact.css">
    <link rel="icon" href="IMG/tabbild.png" type="image/jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <a href="index.html">
                <picture class="logo">
                    <source srcset="IMG/Storeground_Logo.webp" type="image/webp">
                    <img src="IMG/Storeground_Logo.png" alt="Storeground Logo">
                </picture>
            </a>
            <label for="nav-toggle" class="nav-toggle">☰</label>
            <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox">
            <nav class="nav">
                <ul>
                    <li><a href="infotickets.html">Info & Tickets</a></li>
                    <li><a href="about.html">Über das Festival</a></li>
                    <!-- <li><a href="gallery.html">Galerie</a></li> -->
                    <li><a href="contact.html" class="active">Kontakt</a></li>
                    <li><a href="https://www.instagram.com/storeground_bandfestival/" target="_blank" id="insta-button" aria-label="Instagram Storeground"><i class="fa fa-instagram"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1>Kontakt</h1>

        <form action="https://api.web3forms.com/submit" method="post" class="contact-form" id="meinFormular">
            <input type="hidden" name="access_key" value="1edda660-a948-4657-b14c-86b412332858">



            <div>
                <label for="firstname">Vorname:*</label>
                <input type="text" id="firstname" name="firstname" minlength="2" maxlength="20" required
                    pattern="^([A-ZÄÖÜ][a-zäöü]+(-)?([A-ZÄÖÜ]([a-zäöü]+))?)$">
            </div>
            <div>
                <label for="lastname">Nachname:</label>
                <input type="text" id="lastname" name="lastname" minlength="2" maxlength="20"
                    pattern="^([A-ZÄÖÜ][a-zäöü]+(-)?([A-ZÄÖÜ]([a-zäöü]+))?)$">
            </div>
            <div>
                <label for="email">E-Mail:*</label>
                <input type="email" id="email" name="email" required placeholder="email@email.ch"
                    pattern="^[\.\-\_]*[@]{1}[a-z]+[\.][a-z]+$">
            </div>
            <div>
                <label for="message">Nachricht:*</label>
                <textarea id="message" name="message" rows="4" cols="50" required></textarea>
            </div><br>

            <button type="submit">Absenden</button>
        </form>

        <script>
            const formular = document.getElementById("meinFormular");

            formular.addEventListener("submit", function (event) {
                // Formular wird normal abgeschickt

                setTimeout(() => {
                    formular.reset();
                }, 0);
            });
        </script>
    </main>


    <footer class="site-footer">
        <div class="container">
            <br><br><br>
            <picture class="logosmall">
                <source srcset="IMG/Storeground_Logo.webp" type="image/webp">
                <img src="IMG/Storeground_Logo.png" alt="Storeground Logo">
            </picture><br>
            <a href="impressum.html" class="impressum">Impressum</a>
            <p>&copy; 2026 Storeground. Alle Rechte vorbehalten.</p>
        </div>
    </footer>
</body>

</html>
